[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    network: marks tests that need network access
filterwarnings =
    ignore::DeprecationWarning:yfinance.*
    ignore::FutureWarning:pandas.*
