name: Backtest

on:
  schedule:
    - cron: '0 18 * * 0'  # Sonntags um 19:00 Uhr Wien
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Libraries installieren
        run: pip install -r requirements.txt

      - name: Backtest ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python backtest.py

      - name: Backtest-Ergebnisse speichern
        run: |
          git config user.email "bot@trading.com"
          git config user.name "Trading Bot"
          git add backtest_results.json
          git diff --staged --quiet || git commit -m "Backtest Ergebnisse $(date +%Y-%m-%d)"
          git push
