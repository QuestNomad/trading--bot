name: Trading Bot

on:
  schedule:
    - cron: '0 21 * * 1-5'  # Mo-Fr um 22:00 Uhr Wien
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Libraries installieren
        run: pip install requests pandas numpy matplotlib yfinance feedparser vaderSentiment

      - name: Bot ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADING212_API_KEY: ${{ secrets.TRADING212_API_KEY }}
          BITPANDA_API_KEY: ${{ secrets.BITPANDA_API_KEY }}
        run: python bot.py
