name: Trading Bot

on:
  schedule:
    - cron: '0 21 * * 1-5'  # Mo-Fr um 22:00 Uhr Wien
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-Run Modus (keine Telegram-Nachrichten)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Libraries installieren
        run: pip install -r requirements.txt

      - name: Bot ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADING212_API_KEY: ${{ secrets.TRADING212_API_KEY }}
          BITPANDA_API_KEY: ${{ secrets.BITPANDA_API_KEY }}
          SHEETS_URL: ${{ secrets.SHEETS_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python bot.py

      - name: Journal in GitHub speichern
        run: |
          git config user.email "bot@trading.com"
          git config user.name "Trading Bot"
          git add journal.csv
          git diff --staged --quiet || git commit -m "Journal Update $(date)"
          git push
