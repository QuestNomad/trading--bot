name: Arena Backtest (Retrospektiv)
on:
  workflow_dispatch:
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5.6
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy
      - run: python arena_backtest.py
      - name: Commit results
        run: |
          git config user.name "Arena Backtest"
          git config user.email "bot@arena.local"
          git add arena_backtest_results.json arena_backtest_dashboard.html
          git diff --cached --quiet || git commit -m "Arena Backtest \$(date +%Y-%m-%d)"
                    git pull --rebase origin main && git push || (sleep 5 && git pull --rebase origin main && git push)
