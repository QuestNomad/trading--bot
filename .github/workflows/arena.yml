name: Bot Arena

on:
  schedule:
    - cron: '0 22 * * 1-5'  # Mo-Fr um 22:00 UTC (nach US-Marktschluss)
  workflow_dispatch:  # Manuell auslösbar

env:
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  arena:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5.6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run Bot Arena
        run: python arena.py

      - name: Commit Arena Results
        run: |
          git config user.name "Bot Arena"
          git config user.email "bot@arena.local"
          git add arena_results.json
          git diff --cached --quiet || git commit -m "🏟️ Arena Update $(date +%Y-%m-%d)"
          git push
